<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GitHub Developer Explorer — Profile, Stats & Repos</title>
  <meta name="description" content="Search any GitHub username to view their full developer profile, language breakdown chart, contribution stats, pinned repos, and a sortable list of repositories.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Animated background -->
  <div class="bg-grid" aria-hidden="true"></div>
  <div class="bg-glow" aria-hidden="true"></div>

  <!-- Header -->
  <header class="site-header">
    <div class="header-inner">
      <div class="logo">
        <svg class="logo-icon" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
          <path d="M12 0C5.374 0 0 5.373 0 12c0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23A11.509 11.509 0 0 1 12 5.803c1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576C20.566 21.797 24 17.3 24 12c0-6.627-5.373-12-12-12z"/>
        </svg>
        <span>DevExplorer</span>
      </div>
      <div class="header-tagline">Explore any GitHub developer's universe</div>
    </div>
  </header>

  <main class="main-content">

    <!-- Token / Auth Section -->
    <section class="token-section" id="tokenSection">
      <div class="token-card">
        <div class="token-left">
          <span class="token-label" id="tokenStatusLabel">🔓 Unauthenticated</span>
          <span class="rate-display" id="rateDisplay">Checking rate limit…</span>
        </div>
        <div class="token-right">
          <input type="password" id="tokenInput" placeholder="Paste GitHub Personal Access Token (optional)">
          <button id="saveTokenBtn" class="btn btn-secondary">Save Token</button>
          <button id="clearTokenBtn" class="btn btn-ghost">Clear</button>
        </div>
      </div>
      <div class="rate-bar-wrap" id="rateBarWrap">
        <div class="rate-bar-fill" id="rateBarFill" style="width:100%"></div>
      </div>
    </section>

    <!-- Search -->
    <section class="search-section">
      <h1 class="search-headline">Search a GitHub Developer</h1>
      <p class="search-sub">Get full profile, language stats, and all repositories in one place</p>
      <div class="search-bar" role="search">
        <div class="search-input-wrap">
          <svg class="search-icon" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
            <path fill-rule="evenodd" d="M8 4a4 4 0 100 8 4 4 0 000-8zM2 8a6 6 0 1110.89 3.476l4.817 4.817a1 1 0 01-1.414 1.414l-4.816-4.816A6 6 0 012 8z" clip-rule="evenodd"/>
          </svg>
          <input type="text" id="usernameInput" placeholder="e.g. torvalds, gaearon, sindresorhus…" autocomplete="off" spellcheck="false" aria-label="GitHub username">
        </div>
        <button id="searchBtn" class="btn btn-primary" aria-label="Search">
          <span class="btn-text">Explore</span>
          <svg class="btn-arrow" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true"><path fill-rule="evenodd" d="M1 8a.5.5 0 0 1 .5-.5h11.793l-3.147-3.146a.5.5 0 0 1 .708-.708l4 4a.5.5 0 0 1 0 .708l-4 4a.5.5 0 0 1-.708-.708L13.293 8.5H1.5A.5.5 0 0 1 1 8z"/></svg>
        </button>
      </div>
      <div class="quick-links" id="quickLinks">
        <span>Try:</span>
        <button class="pill-btn" data-user="torvalds">torvalds</button>
        <button class="pill-btn" data-user="gaearon">gaearon</button>
        <button class="pill-btn" data-user="sindresorhus">sindresorhus</button>
        <button class="pill-btn" data-user="yyx990803">yyx990803</button>
        <button class="pill-btn" data-user="tj">tj</button>
      </div>
    </section>

    <!-- Status message -->
    <div id="statusBox" role="alert" aria-live="polite"></div>

    <!-- Skeleton loader -->
    <div id="skeletonLoader" class="skeleton-wrap hidden">
      <div class="skeleton-profile">
        <div class="skel skel-avatar"></div>
        <div class="skel-info">
          <div class="skel skel-line w60"></div>
          <div class="skel skel-line w40"></div>
          <div class="skel skel-line w80"></div>
          <div class="skel-stats">
            <div class="skel skel-stat"></div>
            <div class="skel skel-stat"></div>
            <div class="skel skel-stat"></div>
            <div class="skel skel-stat"></div>
          </div>
        </div>
      </div>
      <div class="skel skel-block"></div>
      <div class="skel skel-block short"></div>
    </div>

    <!-- Results -->
    <div id="results"></div>

  </main>

  <footer class="site-footer">
    <p>Built with ❤️ using the public <a href="https://docs.github.com/en/rest" target="_blank" rel="noopener">GitHub REST API</a> · Unauthenticated: 60 req/hr · With token: 5000 req/hr</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
